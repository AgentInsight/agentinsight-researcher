# Dependabot 依赖更新配置
# 定期检查 pip / docker / github-actions 依赖更新, 自动创建 PR
# 配置参考: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # ========== pip (Python 依赖) ==========
  # 检查 requirements.txt / requirements-dev.txt / requirements.in / requirements-dev.in
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps(pip)"
      include: scope
    # 仅开发依赖可自动合并, 运行时依赖需人工审查 (涉及 AGENTS.md 第 1 章技术栈选型)
    groups:
      development-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production

  # ========== docker (容器镜像) ==========
  # 检查 Dockerfile 中的基础镜像 + docker-compose.yml 中的服务镜像
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "deps(docker)"
      include: scope

  # ========== github-actions (CI/CD 动作) ==========
  # 检查 .github/workflows/ 中使用的 actions 版本
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "deps(ci)"
      include: scope
