name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # ===== SBOM 生成 (P2-3) =====
      # 使用 syft 扫描 Python 依赖生成 CycloneDX 格式 SBOM
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom-${{ steps.version.outputs.VERSION }}.cyclonedx.json
          artifact-name: sbom-cyclonedx

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom-${{ steps.version.outputs.VERSION }}.spdx.json
          artifact-name: sbom-spdx

      # ===== Docker 镜像构建 + cosign 签名 (P2-4) =====
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: docker-build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          provenance: true
          sbom: true

      # ===== cosign 签名 (keyless, OIDC) =====
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker image with cosign (keyless)
        run: |
          cosign sign --yes \
            --annotation "org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}" \
            --annotation "org.opencontainers.image.source=${{ github.repositoryUrl }}" \
            ghcr.io/${{ github.repository }}@${{ steps.docker-build.outputs.digest }}

      - name: Verify cosign signature
        run: |
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${{ github.ref_name }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ghcr.io/${{ github.repository }}@${{ steps.docker-build.outputs.digest }}

      # ===== GitHub Release =====
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            sbom-${{ steps.version.outputs.VERSION }}.cyclonedx.json
            sbom-${{ steps.version.outputs.VERSION }}.spdx.json
