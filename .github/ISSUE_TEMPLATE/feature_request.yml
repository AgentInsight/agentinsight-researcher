name: ✨ 功能建议
description: 提出新功能或改进建议
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出功能建议! 请尽量描述清楚, 帮助我们评估与实现。

        📖 提交前请先查阅 `README.md` 与 `AGENTS.md`, 确认:
        - 该功能是否已被现有能力覆盖 (对话/检索/工具调用三类智能体能力边界);
        - 是否与项目技术栈选型冲突 (不推荐方案需说明优势理由);
        - 是否涉及"Ask first"级变更 (LangGraph 图结构/State schema/RAG 核心算法/外部系统对接等, 见第 4 章)。

        ⚠️ **安全提醒**: 禁止在 Issue 中包含 API Key、Token、密码等敏感信息。
  - type: textarea
    id: feature_description
    attributes:
      label: 功能描述
      description: 简明描述你希望新增/改进的功能
      placeholder: 我希望 Agent 能够...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 该功能解决什么痛点? 当前是如何绕过的?
      placeholder: |
        当前遇到的问题是...
        暂时通过 ... 绕过, 但存在 ... 缺陷。
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: 建议的方案
      description: 你期望如何实现? 涉及哪些模块 (graph/agents/rag/tools/llm/memory/observability/api)?
      placeholder: |
        建议在 `src/...` 模块新增...
        调用链路: 请求 -> ... -> 响应
        涉及项目约定 ...。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案? 为何不采纳?
      placeholder: |
        备选方案 A: ... (不采纳原因: ...)
        备选方案 B: ... (不采纳原因: ...)
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 截图、原型、参考链接、相关 Issue 等任何补充
      placeholder: 可附截图/草图/参考项目链接
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      description: 该功能主要影响的层级 (见目录结构)
      options:
        - graph/ (LangGraph 图定义)
        - agents/ (Agent 实现)
        - rag/ (RAG 检索层)
        - tools/ (MCP 工具)
        - llm/ (模型网关)
        - memory/ (Checkpointer/会话)
        - observability/ (AgentInsight 追踪)
        - api/ (FastAPI 路由)
        - common/ (公用模块)
        - 部署/运维 (Docker/Compose/脚本)
        - 文档/评测 (docs/evals)
        - 其他
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: 自查清单
      description: 提交前请确认
      options:
        - label: 我已查阅 `README.md` 与 `AGENTS.md`, 确认该功能未被现有能力覆盖
          required: true
        - label: 我已搜索现有 Issue/Discussions, 确认无重复建议
          required: true
        - label: 我已确认该建议不与项目技术栈选型冲突 (如冲突已在“建议的方案”中说明优势理由)
          required: true
