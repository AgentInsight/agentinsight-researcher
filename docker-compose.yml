# agentinsight-researcher 容器编排 (生产/联网模式)
# 严格遵循 AGENTS.md 第 12 章: depends_on service_healthy + 命名卷
# 联网模式: 构建时从 PyPI/Docker Hub 下载依赖与镜像, 适用于开源社区
# 生产联网模式 PostgreSQL 由本地 postgres 容器提供, 与 redis/qdrant/embeddings 同属 compose 编排
# 业务表由 Agent 启动时执行 scripts/init.sql 创建 (幂等)
# 依赖顺序: postgres → redis → qdrant → embeddings → agent (rerank 可选)
# 所有环境变量统一从 .env 加载 (env_file + compose 插值), compose 文件不含硬编码
# rerank 容器通过 profile 控制, 默认不启动; 启用: docker compose --profile rerank up -d

services:
  postgres:
    image: docker.io/postgres:${POSTGRES_VERSION:-17}
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - agentinsight-net

  redis:
    image: docker.io/redis:${REDIS_VERSION:-7}
    restart: always
    env_file:
      - .env
    command: >
      sh -c "redis-server
      $${REDIS_AUTH:+--requirepass \"$$REDIS_AUTH\"}
      --maxmemory-policy noeviction"
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_AUTH:+-a \"$$REDIS_AUTH\"} ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - agentinsight-net

  qdrant:
    image: qdrant/qdrant:${QDRANT_VERSION:-v1.18.0}
    restart: always
    env_file:
      - .env
    environment:
      QDRANT__LOG_LEVEL: ${QDRANT_LOG_LEVEL:-INFO}
      QDRANT__SERVICE__GRPC_PORT: ${QDRANT_GRPC_PORT:-6334}
      QDRANT__SERVICE__HTTP_PORT: ${QDRANT_HTTP_PORT:-6333}
      QDRANT__SERVICE__STATIC_API_KEY: ${QDRANT_API_KEY:-}
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:${QDRANT_HTTP_PORT:-6333}"
      - "${QDRANT_GRPC_PORT:-6334}:${QDRANT_GRPC_PORT:-6334}"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/$${QDRANT_HTTP_PORT:-6333}' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - agentinsight-net

  embeddings:
    # BGE 服务镜像 (bge-large-zh-v1.5), 联网模式从 Docker Hub 拉取
    # 模型权重: 优先挂载本地预下载 (packages/models/bge-large-zh-v1.5), 避免运行时联网下载
    # 生产联网模式若本地无模型, TEI 会从 HuggingFace 下载到 /data 缓存 (AGENTS.md 第 12 章允许联网)
    image: ${TEI_IMAGE:-tei-embedding}:${TEI_TAG:-cpu-1.9}
    restart: always
    env_file:
      - .env
    environment:
      MODEL_ID: ${EMBEDDINGS_MODEL_PATH:-/data/bge-large-zh-v1.5}
      DTYPE: ${EMBEDDINGS_DTYPE:-float32}
      MAX_BATCH_TOKENS: ${EMBEDDINGS_MAX_BATCH_TOKENS:-16384}
      MAX_CLIENT_BATCH_SIZE: ${EMBEDDINGS_MAX_CLIENT_BATCH_SIZE:-32}
      MAX_CONCURRENT_REQUESTS: ${EMBEDDINGS_MAX_CONCURRENT_REQUESTS:-512}
      AUTO_TRUNCATE: ${EMBEDDINGS_AUTO_TRUNCATE:-true}
      PORT: "${EMBEDDINGS_PORT:-8088}"
      API_KEY: ${EMBEDDINGS_API_KEY:-}
    ports:
      - "${EMBEDDINGS_PORT:-8088}:${EMBEDDINGS_PORT:-8088}"
    volumes:
      - ./packages/models/bge-large-zh-v1.5:/data/bge-large-zh-v1.5:ro
      - embeddings_models:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${EMBEDDINGS_PORT:-8088}/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - agentinsight-net

  rerank:
    # BGE Reranker 服务镜像 (bge-reranker-v2-m3), 可选容器
    # 默认不启动; 启用方式: docker compose --profile rerank up -d
    # 同时需在 .env 设置 RERANK_ENABLED=true
    profiles: ["rerank"]
    image: ${TEI_IMAGE:-tei-embedding}:${TEI_TAG:-cpu-1.9}
    restart: always
    env_file:
      - .env
    environment:
      MODEL_ID: ${RERANK_MODEL_PATH:-/data/bge-reranker-v2-m3}
      DTYPE: ${RERANK_DTYPE:-float16}
      MAX_BATCH_TOKENS: ${RERANK_MAX_BATCH_TOKENS:-16384}
      MAX_CLIENT_BATCH_SIZE: ${RERANK_MAX_CLIENT_BATCH_SIZE:-32}
      MAX_CONCURRENT_REQUESTS: ${RERANK_MAX_CONCURRENT_REQUESTS:-512}
      PORT: "${RERANK_PORT:-8089}"
      API_KEY: ${RERANK_API_KEY:-}
    ports:
      - "${RERANK_PORT:-8089}:${RERANK_PORT:-8089}"
    volumes:
      - ./packages/models/bge-reranker-v2-m3:/data/bge-reranker-v2-m3:ro
      - rerank_models:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${RERANK_PORT:-8089}/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - agentinsight-net

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentinsight-researcher:latest
    restart: always
    env_file:
      - .env
    ports:
      - "${AGENT_PORT:-8066}:${AGENT_PORT:-8066}"
    volumes:
      - session_data:/app/data/sessions
      - uploads_data:/tmp/uploads
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      embeddings:
        condition: service_healthy
      # rerank 为可选容器 (profiles: [rerank]), 不强制依赖
      # PostgreSQL 由外部托管, 不在 depends_on 内
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8066/health', timeout=5.0); assert r.status_code==200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - agentinsight-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  session_data:
    driver: local
  uploads_data:
    driver: local
  embeddings_models:
    driver: local
  rerank_models:
    driver: local

networks:
  agentinsight-net:
    driver: bridge
