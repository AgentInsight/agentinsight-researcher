# agentinsight-researcher 容器编排 (生产/联网模式)
# depends_on service_healthy + 命名卷
# 联网模式: 构建时从 PyPI/Docker Hub 下载依赖与镜像, 适用于开源社区
# 生产联网模式 PostgreSQL 由本地 postgres 容器提供, 与 redis/qdrant/embeddings 同属 compose 编排
# 业务表由 Agent 启动时执行 scripts/init.sql 创建 (幂等)
# 依赖顺序: postgres → redis → qdrant → embeddings → agent (rerank 可选)
# 所有环境变量统一从 .env 加载 (env_file + compose 插值), compose 文件不含硬编码
# rerank 容器通过 profile 控制, 默认不启动; 启用: docker compose --profile rerank up -d
# 镜像版本/TEI 服务端配置等 compose-only 参数已硬编码 (V4 简化: 从 .env 移除)

services:
  postgres:
    image: docker.io/postgres:17
    restart: always
    env_file:
      - .env
    # 配置 max_connections=200 适应双连接池架构 (asyncpg + psycopg)
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: docker.io/redis:8
    restart: always
    env_file:
      - .env
    command: >
      sh -c "redis-server
      $${REDIS_AUTH:+--requirepass \"$$REDIS_AUTH\"}
      --maxmemory-policy noeviction"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_AUTH:+-a \"$$REDIS_AUTH\"} ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.18.0
    restart: always
    env_file:
      - .env
    environment:
      QDRANT__LOG_LEVEL: INFO
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__STATIC_API_KEY: ${QDRANT_API_KEY:-}
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  embeddings:
    # BGE 服务镜像 (bge-base-zh-v1.5, 768维), 联网模式从 Docker Hub 拉取
    # 生产联网模式: 模型权重由 TEI 容器首次启动时从 HuggingFace 下载到命名卷 embeddings_models 缓存
    # (生产联网模式允许联网下载; 不挂载本地 packages/models/, 与离线模式区分)
    image: tei-embedding:cpu-1.9
    restart: always
    env_file:
      - .env
    environment:
      # TEI 服务端配置 (compose-only 参数硬编码, 不暴露到 .env)
      MODEL_ID: /data/bge-base-zh-v1.5
      DTYPE: float32
      MAX_BATCH_TOKENS: 16384
      MAX_CLIENT_BATCH_SIZE: ${EMBEDDINGS_MAX_CLIENT_BATCH_SIZE:-4}
      MAX_CONCURRENT_REQUESTS: ${EMBEDDINGS_TEI_MAX_CONCURRENT:-16}
      AUTO_TRUNCATE: "true"
      PORT: "8088"
      API_KEY: ${EMBEDDINGS_API_KEY:-}
    ports:
      - "127.0.0.1:8088:8088"
    volumes:
      # 命名卷: TEI 用 /data 作为 HF cache (可写, 首次启动从 HuggingFace 下载模型并缓存)
      - embeddings_models:/data
    healthcheck:
      # TEI 镜像 ENTRYPOINT=[text-embeddings-router], CMD 形式会被拦截
      # 改用 CMD-SHELL + curl 绝对路径, 绕过 ENTRYPOINT 拦截
      test: ["CMD-SHELL", "/usr/bin/curl -sf http://localhost:8088/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  searxng:
    # 元搜索引擎 (替代 DuckDuckGo 直连, 国内可用), 聚合 Bing/Baidu/Brave 等
    # 仅绑定 127.0.0.1, agent 容器通过 compose 网络以服务名 searxng:8099 访问
    # 自定义镜像: 构建时预装 curl_cffi (替代启动时 pip install, 加速容器启动)
    # 生产联网模式: Dockerfile.searxng 构建时联网 pip install curl_cffi
    build:
      context: .
      dockerfile: Dockerfile.searxng
    image: agentinsight-searxng:latest
    restart: always
    ports:
      - "127.0.0.1:8099:8099"
    env_file:
      - .env
    environment:
      # SearXNG 镜像启动脚本通过 SEARXNG_PORT 覆盖 settings.yml 的 server.port
      SEARXNG_PORT: "8099"
    volumes:
      # 配置文件 (含引擎开关/limiter/redis 配置)
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml
      - ./config/searxng/limiter.toml:/etc/searxng/limiter.toml
      # sogou_stealth 自定义引擎直接 bind mount 到 searx 包目录 (替代 cp 命令, 更可靠)
      - ./config/searxng/engines/sogou_stealth.py:/usr/local/searxng/searx/engines/sogou_stealth.py:ro
      # baidu_stealth / quark_stealth 自定义引擎 (curl_cffi Chrome TLS 指纹规避 CAPTCHA)
      - ./config/searxng/engines/baidu_stealth.py:/usr/local/searxng/searx/engines/baidu_stealth.py:ro
      - ./config/searxng/engines/quark_stealth.py:/usr/local/searxng/searx/engines/quark_stealth.py:ro
      # 数据卷 (limiter 限流数据, 如启用 redis 则无需)
      - searxng_data:/etc/searxng/data
    # 资源限制 (元搜索引擎轻量, 限制内存防泄漏)
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 1.0
    healthcheck:
      # SearXNG 镜像基于 Alpine 无 curl, 改用 busybox wget
      # 添加 X-Forwarded-For 头, 避免 SearXNG botdetection "X-Forwarded-For nor X-Real-IP header is set!" 警告
      test: ["CMD-SHELL", "wget -q -O /dev/null --header='X-Forwarded-For: 127.0.0.1' http://127.0.0.1:8099/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # 多 Agent 架构: 服务名带 -researcher 后缀, 与未来 agent-xxx 区分
  agent-researcher:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentinsight-researcher:latest
    restart: always
    env_file:
      - .env
    ports:
      - "8066:8066"
    volumes:
      - session_data:/app/data/sessions
      - uploads_data:/tmp/uploads
      # FastEmbed ONNX 模型文件 (bge-small-zh-v1.5, 上下文压缩精排用)
      # 生产联网模式: 模型运行时从 HuggingFace 自动下载
      # 如需使用本地预下载模型: ./packages/models/bge-small-zh-v1.5-onnx:/app/models/bge-small-zh-v1.5-onnx:ro
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      embeddings:
        condition: service_healthy
      postgres:
        condition: service_healthy
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8066/health', timeout=5.0); assert r.status_code==200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # 新增: 独立 frontend 容器 (Next.js + Node 运行时)
  # 多阶段构建: builder 阶段 npm ci + npm run build, runtime 阶段仅复制 .next/standalone
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: agentinsight-frontend:latest
    restart: always
    env_file:
      - .env
      - .env.frontend
    environment:
      # 覆盖 Docker 默认 HOSTNAME (容器ID), 让 Next.js standalone 监听 0.0.0.0 而非容器具体 IP
      # 否则 healthcheck wget http://localhost:8801 会 Connection refused
      HOSTNAME: "0.0.0.0"
    ports:
      - "8801:8801"
    depends_on:
      agent-researcher:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8801/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # 未来添加新 Agent 示例 (取消注释即启用):
  # agent-writer:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   image: agentinsight-writer:latest
  #   ports:
  #     - "8067:8066"
  #   environment:
  #     - AGENT_NAME=agentinsight-writer
  #     - SELF_HOST=true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  session_data:
    driver: local
  uploads_data:
    driver: local
  embeddings_models:
    driver: local
  rerank_models:
    driver: local
  searxng_data:
    driver: local
  frontend_cache:
    driver: local
