# agentinsight-researcher 容器编排 (联网模式)
# 严格遵循 AGENTS.md 第 12 章: 6 容器 + depends_on service_healthy + 命名卷
# 联网模式: 构建时从 PyPI/Docker Hub 下载依赖与镜像, 适用于开源社区
# 依赖顺序: postgres → redis → qdrant → embeddings → agent (rerank 可选)
# rerank 容器通过 profile 控制, 默认不启动; 启用: docker compose --profile rerank up -d

services:
  postgres:
    image: docker.io/postgres:${POSTGRES_VERSION:-17}
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agis -d agentinsight"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
  redis:
    image: docker.io/redis:7
    restart: always
    # CHANGEME: row below to secure redis password
    command: >
      --requirepass ${REDIS_AUTH:-7097053B469745F5BC538BE94B76F716}
      --maxmemory-policy noeviction
    env_file:
      - .env
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "7097053B469745F5BC538BE94B76F716", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.18.0
    restart: always
    environment:
      QDRANT__LOG_LEVEL: INFO
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    healthcheck:
      # qdrant 镜像无 wget/curl, 用 bash /dev/tcp 探活
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  embeddings:
    # BGE 服务镜像 (bge-large-zh-v1.5), 联网模式从 Docker Hub 拉取 TEI 1.5
    image: tei-embedding:cpu-1.9
    restart: always
    environment:
      MODEL_ID: /data/bge-large-zh-v1.5
      DTYPE: float32
      MAX_BATCH_TOKENS: "16384"
      MAX_CLIENT_BATCH_SIZE: "32"
      MAX_CONCURRENT_REQUESTS: "512"
      AUTO_TRUNCATE: "true"
      PORT: "8088"
    ports:
      - "8088:8088"
    volumes:
      - embeddings_models:/data  # named volume 避免 bind mount 权限问题
    healthcheck:
      # TEI 1.5 内置 curl, 探活 8100 端口
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s  # 模型加载较慢, 给 3 分钟

  rerank:
    # BGE Reranker 服务镜像 (bge-reranker-v2-m3), 可选容器
    # 默认不启动; 启用方式: docker compose --profile rerank up -d
    # 同时需在 .env 设置 RERANK_ENABLED=true
    profiles: ["rerank"]
    image: tei-embedding:cpu-1.9
    restart: always
    environment:
      MODEL_ID: /data/bge-reranker-v2-m3
      DTYPE: float16
      MAX_BATCH_TOKENS: "16384"
      MAX_CLIENT_BATCH_SIZE: "32"
      MAX_CONCURRENT_REQUESTS: "512"
      PORT: "8089"
    ports:
      - "8089:8089"
    volumes:
      - rerank_models:/data
    healthcheck:
      # TEI 1.5 内置 curl, 探活 8101 端口
      test: ["CMD", "curl", "-f", "http://localhost:8101/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s  # 模型加载较慢, 给 3 分钟
    networks:
      - agentinsight-net

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentinsight-researcher:latest
    restart: always
    env_file:
      - .env
    environment:
      - ENV=${ENV:-dev}
      - PYTHONUNBUFFERED=1
      - LANG=C.UTF-8
      - PYTHONIOENCODING=utf-8
    ports:
      - "8066:8066"  # 唯一对外端口, AGENTS.md 第 12 章
    volumes:
      - session_data:/app/data/sessions
      - uploads_data:/tmp/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      embeddings:
        condition: service_healthy
      # rerank 为可选容器 (profiles: [rerank]), 不强制依赖
      # 启用 rerank 时需手动确保 rerank 容器健康, 或在此添加 depends_on
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8066/health', timeout=5.0); assert r.status_code==200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - agentinsight-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  session_data:
    driver: local
  uploads_data:
    driver: local
  embeddings_models:
    driver: local
  rerank_models:
    driver: local
