# Pre-commit hooks (测试规则配套)
# 预提交钩子 (配套测试规则)
#
# 安装 / Install:    pip install pre-commit && pre-commit install
# 手动运行 / Manual: pre-commit run --all-files
#
# 配置对齐 pyproject.toml:
#   ruff  -> target-version=py312, line-length=100, select=[E,F,W,I,N,B,C4,UP,ASYNC]
#   mypy  -> strict=true, python_version=3.12, ignore_missing_imports=true

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: [--strict, src/]
        additional_dependencies:
          - pydantic>=2.10
          - pydantic-settings>=2.6
          - langchain-core>=1.4

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-toml
      - id: mixed-line-ending
        args: [--fix=lf]
