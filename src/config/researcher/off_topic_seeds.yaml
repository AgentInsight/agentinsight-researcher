# 离题/闲聊种子模式
# 懒初始化时预填充到 Qdrant off_topic_patterns namespace, 用 Embeddings 语义匹配.
# 涵盖身份/情感/娱乐/常识/能力/话题转移/问候/评价等闲聊意图.
# 共 118 条不重复种子, 与 short_query_seeds 互补:
#   - short_query_seeds 覆盖短词/短语 (长度通常 ≤6)
#   - off_topic_seeds 覆盖句子/完整问句 (语义匹配闲聊意图)
seeds:
