# 闲聊/离题正则模式 (P1-Future-07)
# 用于规则层快速拦截高频闲聊句式, 命中即返回 OFF_TOPIC (零 LLM 成本).
# 设计原则: 仅匹配明显与研究/分析无关的句式, 模糊语义留给 Embeddings/LLM 层.
# 编译时统一使用 re.UNICODE, 中文匹配 \u4e00-\u9fa5.
patterns:
  # 问候类
  - "你好.*"
  - "您好.*"
  - "(嗨|哈喽|hello|hi|hey).*$"
  # 身份询问类
  - "你叫什么"
  - "你是谁"
  - "你多大了"
  - "你是真人吗"
  - "你是机器人吗"
  # 能力询问类
  - "你能做什么"
  - "你会什么"
  - "怎么用"
  - "帮助"
  - "菜单"
  # 娱乐请求类
  - "讲个笑话"
  - "说个故事"
  # 常识/算术类
  - "1\\+1等于几"
  - "天气怎么样"
  - "现在几点"
  - "今天日期"
  # 情绪表达类
  - "我好累"
  - "我好开心"
  - "无聊"
  - "聊天"
  # 话题转移类
  - "不想研究了"
  - "算了"
  # 告别类
  - "再见"
  - "拜拜"
  # 感谢类
  - "谢谢"
  - "感谢"
  # 闲聊询问类
  - "今天怎么样"
  - "你喜欢什么"
  - "你有感情吗"
